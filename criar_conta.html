<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - Bilheteira</title>
    <link rel="stylesheet" href="styles/style.css">
    <script src="scripts/app.js" defer></script>
</head>
<body>
    <header>
        <h1>Bilheteira do Clube</h1>
        <nav><a href="index.html">Voltar aos Jogos</a></nav>
    </header>

    <main class="container">
        <section class="form-section">
            <h2>Criar Conta de Adepto</h2>

            <form action="scripts/registar.php" method="post" id="form-registo" novalidate>
                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome" placeholder="Ex: Tomas" required>
                <small class="field-message" id="nome-message"></small>

                <label for="username">E-mail:</label>
                <input type="email" id="username" name="username" placeholder="Ex: tomas@email.com" required>
                <small class="field-message" id="username-message"></small>

                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required minlength="4">
                <small class="field-message" id="password-message"></small>

                <button type="submit" class="btn">Registar</button>
            </form>
        </section>
    </main>
</body>
</html>
