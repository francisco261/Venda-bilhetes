<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - Bilheteira</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <header>
        <h1>Bilheteira do Clube</h1>
        <nav><a href="index.html">Voltar aos Jogos</a></nav>
    </header>
    <main class="container">
        <section class="form-section">
            <h2>Criar Conta de Adepto</h2>
            <form action="index.html">
                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome" placeholder="Ex: Tomás" required>
                
                <label for="email">E-mail:</label>
                <input type="email" id="email" name="email" required>
                
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>
                
                <button type="submit" class="btn">Registar</button>
            </form>
        </section>
    </main>
</body>
</html>
