<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escolher Bilhete</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <header>
        <h1>Seleção de Lugares</h1>
        <nav><a href="index.html">Voltar aos Jogos</a></nav>
    </header>
    <main class="container">
        <h2>Clube vs Rival FC</h2>
        <form action="pagamento.html" class="ticket-form">
            <fieldset>
                <legend>Escolha a sua zona:</legend>
                <label>
                    <input type="radio" name="zona" value="bancada-central" required>
                    Bancada Central - 45€
                </label><br>
                <label>
                    <input type="radio" name="zona" value="superior">
                    Bancada Superior - 25€
                </label><br>
                <label>
                    <input type="radio" name="zona" value="claque">
                    Setor Claque - 15€
                </label>
            </fieldset>
            <button type="submit" class="btn">Avançar para Pagamento</button>
        </form>
    </main>
</body>
</html>to
