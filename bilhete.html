<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escolher Bilhete</title>
    <link rel="stylesheet" href="styles/style.css">
    <script src="scripts/app.js" defer></script>
</head>
<body>
    <header>
        <h1>Selecao de Lugares</h1>
        <nav><a href="index.html">Voltar aos Jogos</a></nav>
    </header>

    <main class="container">
        <h2 id="nome-jogo">Clube vs Rival FC</h2>

        <form action="pagamento.html" class="ticket-form" id="form-bilhete" method="get" novalidate>
            <fieldset>
                <legend>Escolha a sua zona:</legend>
                <label>
                    <input type="radio" name="zona" value="bancada-central" data-label="Bancada Central" data-preco="45" required>
                    Bancada Central - 45 EUR
                </label><br>
                <label>
                    <input type="radio" name="zona" value="superior" data-label="Bancada Superior" data-preco="25">
                    Bancada Superior - 25 EUR
                </label><br>
                <label>
                    <input type="radio" name="zona" value="claque" data-label="Setor Claque" data-preco="15">
                    Setor Claque - 15 EUR
                </label>
            </fieldset>

            <label for="quantidade">Quantidade:</label>
            <input type="number" id="quantidade" name="quantidade" value="1" min="1" max="4" required>

            <input type="hidden" id="jogo" name="jogo" value="Clube vs Rival FC">
            <input type="hidden" id="preco" name="preco" value="">

            <p id="resumo-bilhete" class="summary">Escolha uma zona para ver o total.</p>
            <small class="field-message" id="bilhete-message"></small>

            <button type="submit" class="btn">Avancar para Pagamento</button>
        </form>
    </main>
</body>
</html>
