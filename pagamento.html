<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulação de Pagamento</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <header>
        <h1>Pagamento</h1>
    </header>
    <main class="container">
        <section class="checkout-section">
            <h2>Detalhes de Pagamento</h2>
            <p>Total a pagar: <strong>Calculado na seleção...</strong></p>
            <form action="index.html">
                <label for="cartao">Número do Cartão:</label>
                <input type="text" id="cartao" placeholder="0000 0000 0000 0000" required>
                
                <button type="submit" class="btn btn-pay">Confirmar Pagamento</button>
            </form>
        </section>
    </main>
</body>
</html>
