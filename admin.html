<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   
    <title>Backoffice Tickets</title>

    <link rel="styles" href="styles/admin_style.css">
</head>
<body>

    <header>
        <div class="header-container">
            <h1>Gestão de Bilheteira </h1>
            <nav>
                <ul>
                    <li><a href="#">Início</a></li>
                    <li><a href="#">Sair</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="admin-panel">
            <h2>Criar Novo Jogo</h2>
            
            <form action="#" method="POST" class="game-form">
                
                <div class="form-group">
                    <label for="adversario">Equipa Adversária:</label>
                    <input type="text" id="adversario" name="adversario" placeholder="Ex: Gil Vicente FC" required>
                </div>

                <div class="form-group">
                    <label for="data-jogo">Data do Jogo:</label>
                    <input type="date" id="data-jogo" name="data-jogo" required>
                </div>

                <div class="form-group">
                    <label for="hora-jogo">Hora:</label>
                    <input type="time" id="hora-jogo" name="hora-jogo" required>
                </div>

                <div class="form-group">
                    <label for="lotacao">Lotação Total (Nº de Bilhetes):</label>
                    <input type="number" id="lotacao" name="lotacao" placeholder="Ex: 50000" required>
                </div>

                <div class="form-group">
                    <label for="preco">Preço Base (€):</label>
                    <input type="number" id="preco" name="preco" placeholder="Ex: 20" required>
                </div>

                <button type="submit" class="btn-submit">Criar Evento</button>
            </form>
        </section>
    </main>

</body>
</html>
