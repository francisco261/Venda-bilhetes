<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backoffice Tickets</title>
    <link rel="stylesheet" href="styles/admin_style.css">
    <link rel="stylesheet" href="styles/style.css">
    <script src="scripts/app.js" defer></script>
</head>
<body>
    <header>
        <div class="header-container">
            <h1>Gestao de Bilheteira</h1>
            <nav>
                <ul>
                    <li><a href="index.html">Inicio</a></li>
                    <li><a href="index.html">Sair</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="admin-panel">
            <h2>Criar Novo Jogo</h2>

            <form action="#" method="POST" class="game-form" id="form-admin" novalidate>
                <div class="form-group">
                    <label for="adversario">Equipa Adversaria:</label>
                    <input type="text" id="adversario" name="adversario" placeholder="Ex: Gil Vicente FC" required>
                    <small class="field-message" id="adversario-message"></small>
                </div>

                <div class="form-group">
                    <label for="data-jogo">Data do Jogo:</label>
                    <input type="date" id="data-jogo" name="data-jogo" required>
                    <small class="field-message" id="data-jogo-message"></small>
                </div>

                <div class="form-group">
                    <label for="hora-jogo">Hora:</label>
                    <input type="time" id="hora-jogo" name="hora-jogo" required>
                    <small class="field-message" id="hora-jogo-message"></small>
                </div>

                <div class="form-group">
                    <label for="lotacao">Lotacao Total (N. de Bilhetes):</label>
                    <input type="number" id="lotacao" name="lotacao" placeholder="Ex: 50000" min="1" required>
                    <small class="field-message" id="lotacao-message"></small>
                </div>

                <div class="form-group">
                    <label for="preco-admin">Preco Base (EUR):</label>
                    <input type="number" id="preco-admin" name="preco" placeholder="Ex: 20" min="1" required>
                    <small class="field-message" id="preco-admin-message"></small>
                </div>

                <p id="admin-preview" class="summary">Preencha os dados para previsualizar o evento.</p>
                <button type="submit" class="btn-submit">Criar Evento</button>
            </form>
        </section>
    </main>
</body>
</html>
